{% extends "base.html" %}
{% block title %}Add Flight — AirTicket{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:720px;">
  <a href="/admin/flights" class="btn btn-outline-secondary btn-sm mb-4">
    <i class="bi bi-arrow-left me-1"></i>Back to Flights
  </a>
  <div class="card p-4">
    <h4 class="fw-800 mb-4"><i class="bi bi-plus-circle me-2 text-primary"></i>Add New Flight</h4>
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-600">Flight Number</label>
          <input type="text" name="flight_number" class="form-control" placeholder="e.g. AI505" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600">Airline</label>
          <select name="airline_id" class="form-select" required>
            <option value="">Select airline</option>
            {% for al in airlines %}
            <option value="{{ al.id }}">{{ al.code }} — {{ al.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600">Origin Airport</label>
          <select name="origin_id" class="form-select" required>
            <option value="">Select origin</option>
            {% for ap in airports %}
            <option value="{{ ap.id }}">{{ ap.city }} ({{ ap.iata_code }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600">Destination Airport</label>
          <select name="destination_id" class="form-select" required>
            <option value="">Select destination</option>
            {% for ap in airports %}
            <option value="{{ ap.id }}">{{ ap.city }} ({{ ap.iata_code }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600">Departure Date & Time</label>
          <input type="datetime-local" name="departure_time" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600">Arrival Date & Time</label>
          <input type="datetime-local" name="arrival_time" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-600">Total Seats</label>
          <input type="number" name="total_seats" class="form-control" value="180" min="1" required>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-600">Economy Price (₹)</label>
          <input type="number" name="price_economy" class="form-control" placeholder="4500" step="0.01" required>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-600">Business Price (₹)</label>
          <input type="number" name="price_business" class="form-control" placeholder="14000" step="0.01" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600">Status</label>
          <select name="status" class="form-select">
            <option value="scheduled">Scheduled</option>
            <option value="delayed">Delayed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="mt-4">
        <button type="submit" class="btn btn-primary fw-700 px-5">
          <i class="bi bi-plus-circle me-2"></i>Add Flight
        </button>
        <a href="/admin/flights" class="btn btn-outline-secondary ms-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
